appId: com.umka.player
productName: UMKA Player
copyright: Copyright © 2026 Museum Systems

directories:
  buildResources: build
  output: release

files:
  - dist
  - dist-electron
  - "!**/*.map"

# Windows build - portable .exe (single file, no install step)
win:
  target:
    - target: portable
      arch: x64
  # Demo builds are unsigned: with no certificate configured electron-builder
  # skips signing by default. (The old `sign`/`signDlls` keys were removed in
  # electron-builder 26 and now fail config validation.)
  forceCodeSigning: false

# Include sample settings file in resources
extraResources:
  - from: "resources/"
    to: "."
    filter:
      - "**/*"

# Build optimization
asar: true
compression: normal
