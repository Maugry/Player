appId: com.umka.player
productName: UMKA Player
copyright: Copyright © 2026 Museum Systems

directories:
  buildResources: build
  output: release

files:
  - dist
  - dist-electron
  - "!**/*.map"

# Windows build — NSIS installer with electron-updater feed (latest.yml + blockmap).
win:
  target:
    - target: nsis
      arch: x64
  # Demo/dev builds are unsigned. In production CI, set CSC_LINK + CSC_KEY_PASSWORD
  # in the environment and electron-builder signs automatically — no config change.
  forceCodeSigning: false
  # Hyphenated literal (not ${productName}, which contains a space) so the feed
  # manifest's path: has no spaces — avoids URL-encoding mismatches when the CMS
  # serves the file and electron-updater fetches it.
  artifactName: UMKA-Player-Windows-${version}-Setup.${ext}

nsis:
  oneClick: true
  perMachine: true          # matches the existing C:\umka\ install layout
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  differentialPackage: true # emits .blockmap for diff updates

# electron-updater feed manifest (latest.yml) is generated by the generic provider.
# The URL here is informational; the runtime feed is set via setFeedURL() from the
# MQTT UpdateCommand (CMS-hosted). Build with `--publish never` to generate the
# feed files locally without uploading.
publish:
  - provider: generic
    url: http://localhost:40000/api/updates

# Include sample settings file in resources
extraResources:
  - from: "resources/"
    to: "."
    filter:
      - "**/*"

# Build optimization
asar: true
compression: normal
