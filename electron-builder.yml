appId: com.umka.player
productName: UMKA Player
copyright: Copyright © 2026 Museum Systems

directories:
  buildResources: build
  output: release

files:
  - dist
  - dist-electron
  - "!**/*.map"

# Windows build - use 'dir' to skip rcedit (requires wine32)
win:
  target:
    - target: dir
      arch: x64
  # Skip code signing for demo builds
  sign: false
  signDlls: false

# Include sample settings file in resources
extraResources:
  - from: "resources/"
    to: "."
    filter:
      - "**/*"

# Build optimization
asar: true
compression: normal
